<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 20px; }
        .map-container { 
            width: 100%; 
            height: 600px; 
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .test-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .test-btn:hover { background: #096dd9; }
        .status { 
            margin-top: 20px; 
            padding: 15px;
            background: #f0f2f5;
            border-radius: 4px;
        }
    </style>
    
    <!-- 天地图 API -->
    <script type="text/javascript" src="https://api.tianditu.gov.cn/api?v=4.0&tk=2c13930c89641751455d91654dc9640d"></script>
</head>
<body>
    <div class="container">
        <h1>🗺️ 天地图 API 测试</h1>
        
        <div class="map-container" id="map"></div>
        
        <button class="test-btn" onclick="addMarker()">添加标记</button>
        <button class="test-btn" onclick="changeZoom()">缩放地图</button>
        
        <div class="status" id="status">
            <strong>状态：</strong>正在加载地图...
        </div>
    </div>

    <script>
        let map;
        const statusDiv = document.getElementById('status');
        
        // 检查天地图是否加载成功
        if (typeof T === 'undefined') {
            statusDiv.innerHTML = '<strong style="color:red;">❌ 天地图 API 加载失败！</strong><br>请检查网络连接或 API Key 是否有效';
            document.getElementById('map').innerHTML = '<div style="padding:100px;text-align:center;color:#999;">地图加载失败</div>';
        } else {
            statusDiv.innerHTML = '<strong style="color:green;">✅ 天地图 API 加载成功！</strong>';
            
            // 初始化地图
            map = new T.Map('map');
            map.centerAndZoom(new T.LngLat(115.654, 32.168), 12);
            map.enableScrollWheelZoom();
            
            // 添加标记
            const marker = new T.Marker(new T.LngLat(115.654, 32.168));
            map.addOverLay(marker);
            
            // 添加信息窗口
            marker.addEventListener('click', function() {
                const infoWin = new T.InfoWindow('<b>固始县配送中心</b><br>测试成功！');
                marker.openInfoWindow(infoWin);
            });
            
            statusDiv.innerHTML += '<br><strong>地图已初始化，点击标记查看信息窗口</strong>';
        }
        
        function addMarker() {
            if (!map) return;
            const lat = 32.168 + (Math.random() - 0.5) * 0.1;
            const lon = 115.654 + (Math.random() - 0.5) * 0.1;
            const marker = new T.Marker(new T.LngLat(lon, lat));
            map.addOverLay(marker);
            statusDiv.innerHTML += '<br>✅ 添加标记成功';
        }
        
        function changeZoom() {
            if (!map) return;
            const zoom = map.getZoom();
            map.setZoom(zoom === 12 ? 14 : 12);
            statusDiv.innerHTML += '<br>✅ 缩放成功';
        }
    </script>
</body>
</html>
