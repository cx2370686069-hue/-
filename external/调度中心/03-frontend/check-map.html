<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>检测天地图连接</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        .result { padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .error { background: #fff1f0; border: 1px solid #ffa39e; color: #f5222d; }
        .info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
    </style>
</head>
<body>
    <h1>🌍 天地图连接检测</h1>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(title, status, message) {
            const div = document.createElement('div');
            div.className = `result ${status}`;
            div.innerHTML = `<strong>${title}:</strong> ${message}`;
            results.appendChild(div);
        }
        
        // 1. 检查 T 对象
        if (typeof T !== 'undefined') {
            addResult('天地图 API', 'success', '✅ 加载成功');
        } else {
            addResult('天地图 API', 'error', '❌ 加载失败 - 请检查网络和代理设置');
        }
        
        // 2. 检查 API 域名
        fetch('https://api.tianditu.gov.cn/', { mode: 'no-cors' })
            .then(() => {
                addResult('API 服务器连接', 'success', '✅ 可以访问 api.tianditu.gov.cn');
            })
            .catch(() => {
                addResult('API 服务器连接', 'error', '❌ 无法访问 - 可能被代理拦截');
            });
        
        // 3. 检查网络类型
        if (navigator.onLine) {
            addResult('网络连接', 'success', '✅ 在线');
        } else {
            addResult('网络连接', 'error', '❌ 离线');
        }
        
        // 4. 检测代理
        addResult('代理检测', 'info', '如果天地图加载失败，请尝试关闭代理或添加白名单规则');
        
        // 5. 给出建议
        setTimeout(() => {
            if (typeof T === 'undefined') {
                addResult('建议', 'info', `
                    <ol>
                        <li>关闭代理软件</li>
                        <li>刷新页面（Ctrl+F5）</li>
                        <li>或在代理中添加白名单：tianditu.gov.cn</li>
                    </ol>
                `);
            }
        }, 1000);
    </script>
</body>
</html>
