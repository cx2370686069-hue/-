<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固始县外卖调度中心</title>
    <!-- Socket.io 客户端 -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- 天地图 API -->
    <script type="text/javascript" src="https://api.tianditu.gov.cn/api?v=4.0&tk=66b24ca27c124253d7273c7da0af8818"></script>
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🔷</span>
                <div class="logo-text">
                    <h1>固始县外卖调度中心</h1>
                    <span class="status-badge online">系统正常运行</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <span class="stat-num" id="onlineDrivers">0</span>
                    <span class="stat-label">在线司机</span>
                </div>
                <div class="header-stat">
                    <span class="stat-num" id="pendingOrders">0</span>
                    <span class="stat-label">待分配</span>
                </div>
                <div class="header-stat">
                    <span class="stat-num" id="deliveringOrders">0</span>
                    <span class="stat-label">配送中</span>
                </div>
                <div class="header-stat">
                    <span class="stat-num" id="todayCompleted">0</span>
                    <span class="stat-label">今日完成</span>
                </div>
            </div>
        </header>

        <!-- 主体内容 -->
        <div class="main">
            <!-- 左侧边栏 -->
            <aside class="sidebar">
                <!-- 待分配订单 -->
                <div class="section">
                    <div class="section-header">
                        <h3>📦 待分配订单</h3>
                        <span class="badge" id="pendingBadge">0</span>
                    </div>
                    <div class="order-pool" id="orderPool">
                        <!-- 订单卡片将动态生成 -->
                    </div>
                </div>

                <!-- 在线司机 -->
                <div class="section">
                    <div class="section-header">
                        <h3>🚗 在线司机</h3>
                        <button class="btn-small" onclick="initDrivers()">+ 添加司机</button>
                    </div>
                    <div class="driver-list" id="driverList">
                        <!-- 司机卡片将动态生成 -->
                    </div>
                </div>
            </aside>

            <!-- 右侧地图区域 -->
            <main class="map-area">
                <div id="map" class="map"></div>
                
                <!-- 地图工具栏 -->
                <div class="map-toolbar">
                    <button class="tool-btn" onclick="showAllOrders()" title="显示所有订单">
                        📦
                    </button>
                    <button class="tool-btn" onclick="showAllDrivers()" title="显示所有司机">
                        🚗
                    </button>
                    <button class="tool-btn" onclick="resetMapView()" title="重置视图">
                        ⌂
                    </button>
                </div>

                <!-- 图例 -->
                <div class="legend">
                    <div class="legend-item">
                        <span class="dot driver-free"></span>
                        <span>空闲司机</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot driver-busy"></span>
                        <span>配送中</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot order-pending"></span>
                        <span>待分配订单</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot order-delivering"></span>
                        <span>配送中</span>
                    </div>
                </div>
            </main>
        </div>

        <!-- 底部状态栏 -->
        <footer class="footer">
            <div class="footer-left">
                <span class="time" id="currentTime">--:--</span>
                <span class="divider">|</span>
                <span class="weather">☀️ 固始县 晴天 25°C</span>
            </div>
            <div class="footer-right">
                <span>平均配送时长：<strong id="avgTime">--</strong> 分钟</span>
                <span class="divider">|</span>
                <span>准时率：<strong id="onTimeRate">--</strong>%</span>
            </div>
        </footer>
    </div>

    <!-- 订单分配弹窗 -->
    <div class="modal" id="assignModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📦 分配订单</h3>
                <button class="close-btn" onclick="closeAssignModal()">×</button>
            </div>
            <div class="modal-body" id="assignBody">
                <!-- 订单详情和司机选择 -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeAssignModal()">取消</button>
                <button class="btn-primary" onclick="confirmAssign()">确认分配</button>
            </div>
        </div>
    </div>

    <script src="api.js?v=2"></script>
    <script src="app.js?v=8"></script>
</body>
</html>
