<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>天地图导航测试（通过后端代理）</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .input-group { margin: 15px 0; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input { width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007AFF; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 10px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 4px; white-space: pre-wrap; font-family: monospace; }
        #map { width: 100%; height: 400px; margin-top: 20px; border-radius: 4px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .info { color: #666; }
    </style>
    <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=c7e10854160bfd1cee679eef056bb9ce"></script>
</head>
<body>
    <div class="container">
        <h2>🚗 天地图导航测试（通过后端代理）</h2>
        
        <div class="input-group">
            <label>起点经度:</label>
            <input type="text" id="startLng" value="115.667328" placeholder="如: 115.667328">
        </div>
        <div class="input-group">
            <label>起点纬度:</label>
            <input type="text" id="startLat" value="32.183074" placeholder="如: 32.183074">
        </div>
        <div class="input-group">
            <label>终点经度:</label>
            <input type="text" id="endLng" value="115.700000" placeholder="如: 115.700000">
        </div>
        <div class="input-group">
            <label>终点纬度:</label>
            <input type="text" id="endLat" value="32.200000" placeholder="如: 32.200000">
        </div>
        
        <button onclick="testRoute()">🧪 测试路线规划</button>
        <button onclick="showOnMap()">🗺️ 在地图上显示</button>
        
        <div id="result">点击按钮开始测试...</div>
        <div id="map"></div>
    </div>

    <script>
        let map = null;
        
        // 测试路线规划API（通过后端代理）
        async function testRoute() {
            const startLng = document.getElementById('startLng').value;
            const startLat = document.getElementById('startLat').value;
            const endLng = document.getElementById('endLng').value;
            const endLat = document.getElementById('endLat').value;
            
            if (!startLng || !startLat || !endLng || !endLat) {
                document.getElementById('result').innerHTML = '<span class="error">❌ 请填写完整的坐标信息</span>';
                return;
            }
            
            document.getElementById('result').innerHTML = '<span class="info">⏳ 正在请求后端代理...</span>';
            
            try {
                const response = await fetch('/api/tianditu/drive', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        orig: `${startLng},${startLat}`,
                        dest: `${endLng},${endLat}`,
                        style: '0'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const result = data.data;
                    const distanceKm = (result.distance / 1000).toFixed(2);
                    const durationMin = Math.round(result.duration / 60);
                    
                    document.getElementById('result').innerHTML = 
                        '<span class="success">✅ 路线规划成功！</span>\n\n' +
                        `📍 距离: ${distanceKm} 公里\n` +
                        `⏱️ 预计时间: ${durationMin} 分钟\n` +
                        `🛣️ 路线点数: ${result.routePoints.length}\n\n` +
                        `完整数据:\n${JSON.stringify(result, null, 2)}`;
                } else {
                    document.getElementById('result').innerHTML = 
                        '<span class="error">❌ 路线规划失败</span>\n\n' +
                        `错误信息: ${data.message}\n` +
                        `详细信息: ${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ 请求失败</span>\n\n' +
                    `错误信息: ${error.message}`;
            }
        }
        
        // 在地图上显示
        async function showOnMap() {
            const startLng = parseFloat(document.getElementById('startLng').value);
            const startLat = parseFloat(document.getElementById('startLat').value);
            const endLng = parseFloat(document.getElementById('endLng').value);
            const endLat = parseFloat(document.getElementById('endLat').value);
            
            if (!startLng || !startLat || !endLng || !endLat) {
                document.getElementById('result').innerHTML = '<span class="error">❌ 请填写完整的坐标信息</span>';
                return;
            }
            
            document.getElementById('result').innerHTML = '<span class="info">⏳ 正在获取路线并在地图上显示...</span>';
            
            // 初始化地图
            map = new T.Map('map');
            map.centerAndZoom(new T.LngLat((startLng + endLng) / 2, (startLat + endLat) / 2), 13);
            
            // 添加起点标记
            const startMarker = new T.Marker(new T.LngLat(startLng, startLat));
            map.addOverLay(startMarker);
            
            // 添加终点标记
            const endMarker = new T.Marker(new T.LngLat(endLng, endLat));
            map.addOverLay(endMarker);
            
            // 通过后端代理获取路线
            try {
                const response = await fetch('/api/tianditu/drive', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        orig: `${startLng},${startLat}`,
                        dest: `${endLng},${endLat}`,
                        style: '0'
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.data.routePoints.length > 0) {
                    const result = data.data;
                    const distanceKm = (result.distance / 1000).toFixed(2);
                    const durationMin = Math.round(result.duration / 60);
                    
                    // 转换路线点为天地图坐标对象
                    const points = result.routePoints.map(p => new T.LngLat(p.lon, p.lat));
                    
                    // 画路线
                    const polyline = new T.Polyline(points, {
                        color: '#007AFF',
                        weight: 5,
                        opacity: 0.8
                    });
                    map.addOverLay(polyline);
                    
                    // 自动调整视野
                    map.setViewport(points);
                    
                    document.getElementById('result').innerHTML = 
                        '<span class="success">✅ 路线已显示在地图上！</span>\n\n' +
                        `📍 距离: ${distanceKm} 公里\n` +
                        `⏱️ 预计时间: ${durationMin} 分钟\n` +
                        `🛣️ 路线点数: ${result.routePoints.length}`;
                } else {
                    document.getElementById('result').innerHTML = 
                        '<span class="error">❌ 路线规划失败</span>\n\n' +
                        `错误信息: ${data.message}\n` +
                        `详细信息: ${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<span class="error">❌ 请求失败</span>\n\n' +
                    `错误信息: ${error.message}`;
            }
        }
    </script>
</body>
</html>
