name: delivery-map-test

services:
  graphhopper:
    image: graphhopper/graphhopper:latest
    container_name: graphhopper-server
    ports:
      - "8989:8989"
    volumes:
      - ./graphhopper-data:/data
      - ./graphhopper-config.yml:/config/config.yml
    environment:
      - JAVA_OPTS=-Xmx2g -Xms2g
    restart: unless-stopped
    command: >
      java -Xmx2g -Xms2g -jar graphhopper-web.jar 
      server /data/henan-latest.osm.pbf 
      config /config/config.yml

volumes:
  graphhopper-data:
